services:
  # PostgreSQL 15 — Primary data store
  postgres:
    container_name: callnow-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: voicelink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 — Cache, queues, WebSocket state, rate limiting
  redis:
    container_name: callnow-redis
    image: redis:7-alpine
    ports:
      - '6383:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin 4 — PostgreSQL web admin interface
  pgadmin:
    container_name: callnow-pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@callnow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    volumes:
      - pgadmindata:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  pgdata:
  redisdata:
  pgadmindata:
